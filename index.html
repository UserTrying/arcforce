<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCFORCE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu">
    <h1>ARCFORCE</h1>
    <p>Fantasy Military Platformer</p>
    <button onclick="startGame('solo')">Solo</button>
    <button onclick="startGame('coop')">Co-op</button>
    <button onclick="startGame('pvp')">PvP</button>
    <button onclick="openLeaderboard()">Leaderboard</button>
    <div id="leaderboard"></div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="leaderboard.js"></script>
  <script src="game.js"></script>
<script>
    if ("serviceWorker" in navigator) {
      // checks if this browser supports service workers
      // "serviceWorker" in navigator = does this property exist on the browser

      navigator.serviceWorker.register("/arcforce/sw.js")
      // points the browser to your service worker file
      // uses the full GitHub Pages path not just sw.js
    }
  </script>
<div id="lb-modal" class="modal hidden">
  <div class="modal-box">
    <h2>ACF SCORES</h2>
    <div id="lb-scores"></div>
    <button onclick="closeLeaderboard()">Close</button>
  </div>
</div>

</body>

</html>
